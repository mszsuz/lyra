<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пошаговая инструкция — Заказ клиента на кабельную продукцию (бухты)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
    font-size: 13px;
    background: #1a1a2e;
    color: #333;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ====== TUTORIAL HEADER ====== */
  .tutorial-header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    flex-shrink: 0;
    z-index: 100;
  }
  .tutorial-header h1 { font-size: 15px; font-weight: 600; flex: 1; }
  .step-indicator { font-size: 12px; color: #a0c4e8; white-space: nowrap; }
  .nav-btn {
    padding: 5px 16px; border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1); color: #fff; border-radius: 4px;
    cursor: pointer; font-size: 12px; transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.25); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .progress-bar { height: 3px; background: #0d1b2a; flex-shrink: 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3a8fd4, #6bc5f8); transition: width .3s; }

  /* ====== MAIN LAYOUT ====== */
  .main-area { flex: 1; display: flex; overflow: hidden; }
  .onec-screen { flex: 1; display: flex; flex-direction: column; background: #f5f0e0; overflow: hidden; }

  /* ====== 1C TOP BAR ====== */
  .onec-topbar {
    background: linear-gradient(180deg, #f8f4e6 0%, #ede8d6 100%);
    border-bottom: 1px solid #d0ccc0;
    padding: 4px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #555; flex-shrink: 0;
  }
  .onec-logo { font-weight: 800; color: #d4a017; font-size: 16px; }
  .onec-hamburger { font-size: 16px; color: #888; cursor: default; }
  .onec-topbar-title { flex: 1; color: #666; font-size: 11px; }
  .onec-search { color: #888; font-size: 11px; }
  .onec-user { color: #666; font-size: 11px; }

  /* ====== BREADCRUMB TABS ====== */
  .onec-tabs {
    background: #ece8d8; border-bottom: 1px solid #d0ccc0;
    padding: 0 8px; display: flex; gap: 2px; flex-shrink: 0;
  }
  .onec-tab {
    padding: 5px 14px; font-size: 11px;
    border: 1px solid transparent; border-bottom: none;
    border-radius: 4px 4px 0 0; cursor: default; color: #777;
    background: transparent;
  }
  .onec-tab.active {
    background: #f5f0e0; color: #333;
    border-color: #d0ccc0;
  }

  /* ====== LEFT NAV ====== */
  .onec-content-wrap { flex: 1; display: flex; overflow: hidden; }
  .onec-nav {
    width: 200px; background: #f0ecdd;
    border-right: 1px solid #d8d4c8;
    padding: 6px 0; overflow-y: auto; flex-shrink: 0;
  }
  .nav-item {
    padding: 7px 14px; font-size: 12px; cursor: default;
    display: flex; align-items: center; gap: 8px; color: #555;
    transition: background .1s;
  }
  .nav-item.active { background: #e8e2cc; color: #222; font-weight: 600; }
  .nav-icon { font-size: 14px; width: 18px; text-align: center; }

  /* ====== MAIN CONTENT ====== */
  .onec-main { flex: 1; padding: 12px 16px; overflow-y: auto; background: #f5f0e0; }

  /* -- Section page -- */
  .section-group { margin-bottom: 14px; }
  .section-group-title { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .section-link {
    padding: 3px 0; font-size: 12px; color: #2266aa; cursor: default;
    display: block; text-decoration: none;
  }
  .section-link:hover { text-decoration: underline; }

  /* -- Document form -- */
  .form-toolbar {
    display: flex; gap: 6px; margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid #d8d4c8; flex-wrap: wrap; align-items: center;
  }
  .btn-yellow {
    background: linear-gradient(180deg, #f5e070 0%, #e8c840 100%);
    border: 1px solid #c4a830; padding: 4px 14px;
    font-size: 12px; border-radius: 3px; cursor: default; font-weight: 600; color: #333;
  }
  .btn-gray {
    background: linear-gradient(180deg, #f0eeea 0%, #ddd8cc 100%);
    border: 1px solid #c0bca8; padding: 4px 12px;
    font-size: 11px; border-radius: 3px; cursor: default; color: #555;
  }
  .form-fields { display: grid; grid-template-columns: 140px 1fr; gap: 4px 10px; margin-bottom: 12px; align-items: center; }
  .form-fields .lbl { font-size: 11px; color: #666; text-align: right; }
  .form-fields .fld {
    font-size: 12px; padding: 2px 6px;
    border: 1px solid #ccc8b8; background: #fff;
    border-radius: 2px; min-height: 22px; color: #333;
  }
  .form-fields .fld-link { color: #2266aa; }

  /* -- Form tabs -- */
  .form-tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #d8d4c8; }
  .form-tab {
    padding: 5px 14px; font-size: 11px; cursor: default; color: #777;
    border: 1px solid transparent; border-bottom: none; border-radius: 3px 3px 0 0;
    background: transparent; margin-bottom: -1px;
  }
  .form-tab.active { background: #f5f0e0; color: #333; border-color: #d8d4c8; font-weight: 600; }

  /* -- Tabular part -- */
  .tp-toolbar {
    background: #f5f0e0; border: 1px solid #d8d4c8; border-bottom: none;
    padding: 3px 6px; display: flex; gap: 4px; align-items: center;
  }
  .tab-cmd {
    padding: 2px 10px; font-size: 11px;
    background: #fff; border: 1px solid #c8c4b8; border-radius: 2px; cursor: default;
  }
  .tab-cmd-icon { padding: 2px 6px; font-size: 13px; background: #fff; border: 1px solid #c8c4b8; border-radius: 2px; cursor: default; color: #888; }
  table.tp-tbl {
    width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 1px solid #d8d4c8;
  }
  table.tp-tbl th {
    background: #f0ecdd; border: 1px solid #d8d4c8; padding: 4px 8px;
    text-align: left; font-weight: 600; color: #444; white-space: nowrap;
  }
  table.tp-tbl td { border: 1px solid #e8e4d8; padding: 4px 8px; }
  table.tp-tbl tr.selected { background: #f5e880; }
  table.tp-tbl td.num { text-align: right; }

  /* -- List/journal -- */
  .journal-toolbar {
    display: flex; gap: 6px; margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid #d8d4c8; align-items: center;
  }

  /* -- Modal overlay -- */
  .modal-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 30;
  }
  .modal-box {
    background: #f5f0e0; border: 2px solid #b0a880;
    border-radius: 4px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    padding: 0; min-width: 520px; max-width: 620px;
  }
  .modal-header {
    background: linear-gradient(180deg, #f0ecdd, #e8e2cc);
    padding: 8px 14px; border-bottom: 1px solid #d0ccc0;
    font-size: 13px; font-weight: 600; color: #333;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-body { padding: 12px 14px; }
  .modal-footer {
    padding: 8px 14px; border-top: 1px solid #d0ccc0;
    display: flex; gap: 8px; justify-content: flex-end;
  }
  table.series-tbl {
    width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 1px solid #d8d4c8;
  }
  table.series-tbl th {
    background: #f0ecdd; border: 1px solid #d8d4c8; padding: 4px 8px;
    text-align: left; font-weight: 600; color: #444; white-space: nowrap; font-size: 11px;
  }
  table.series-tbl td { border: 1px solid #e8e4d8; padding: 4px 8px; }
  table.series-tbl td.num { text-align: right; }
  table.series-tbl tr.picked { background: #e8f5e0; }

  /* -- Info block (prerequisite) -- */
  .info-block {
    background: #fff8e0; border: 1px solid #e8d888; border-radius: 6px;
    padding: 14px 18px; margin-bottom: 14px;
  }
  .info-block-title { font-size: 13px; font-weight: 700; color: #8a6d00; margin-bottom: 6px; }
  .info-block p { font-size: 12px; line-height: 1.6; color: #555; margin-bottom: 4px; }
  .info-path { font-family: "Consolas", monospace; font-size: 11px; color: #2266aa; background: #f0ecdd; padding: 1px 5px; border-radius: 2px; }

  /* -- Done page -- */
  .done-page {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; padding: 20px;
  }
  .done-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .done-card {
    padding: 14px 24px; border-radius: 8px; text-align: center;
  }
  .done-card .dc-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .done-card .dc-val { font-size: 20px; font-weight: 700; }

  /* ====== HINT PANEL ====== */
  .hint-panel {
    width: 320px;
    background: #1a2332;
    color: #d4dce8;
    display: flex;
    flex-direction: column;
    box-shadow: -2px 0 10px rgba(0,0,0,0.25);
    z-index: 50;
    flex-shrink: 0;
  }
  .hint-title {
    padding: 14px 18px 10px;
    font-size: 14px;
    font-weight: 700;
    color: #6aadee;
    border-bottom: 1px solid #2a3648;
  }
  .hint-body { flex: 1; padding: 14px 18px; font-size: 13px; line-height: 1.55; overflow-y: auto; }
  .hint-body p { margin-bottom: 8px; }
  .hint-body .hint-action {
    background: #253344;
    border-left: 3px solid #5a9edf;
    padding: 8px 12px; margin: 8px 0;
    border-radius: 0 4px 4px 0; font-size: 12px; line-height: 1.6;
  }
  .hint-body .hint-note { color: #8896a8; font-size: 12px; font-style: italic; }
  .hint-body .hint-tip {
    background: #2a3a28;
    border-left: 3px solid #6ab86a;
    padding: 8px 12px; margin: 8px 0;
    border-radius: 0 4px 4px 0; font-size: 12px; line-height: 1.6; color: #b8d8b0;
  }
  .hint-step-num {
    display: inline-block; background: #3a7fc4; color: #fff;
    width: 24px; height: 24px; border-radius: 50%;
    text-align: center; line-height: 24px;
    font-size: 12px; font-weight: 700; margin-right: 8px; vertical-align: middle;
  }

  /* ====== HIGHLIGHT ====== */
  .hl {
    position: relative;
    z-index: 5;
  }
  .hl::after {
    content: '';
    position: absolute;
    inset: -3px;
    border: 2.5px solid #2a7fff;
    border-radius: 4px;
    animation: hl-pulse 1.4s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
  }
  @keyframes hl-pulse {
    0%, 100% { border-color: #2a7fff; box-shadow: 0 0 6px rgba(42,127,255,0.3); }
    50% { border-color: #6ab4ff; box-shadow: 0 0 16px rgba(42,127,255,0.5); }
  }

  .fld.hl-field {
    background: #ffffdd !important;
    border-color: #2a7fff !important;
  }

  /* Status bar */
  .onec-statusbar {
    background: #ece8d8;
    border-top: 1px solid #d0ccc0;
    padding: 2px 12px;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
  }

  /* -- Ensure/Obespechenie dropdown -- */
  .dropdown-menu {
    position: absolute;
    background: #fff;
    border: 1px solid #c8c4b8;
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    border-radius: 3px;
    padding: 3px 0;
    z-index: 15;
    min-width: 180px;
  }
  .dropdown-item {
    padding: 5px 14px; font-size: 12px; cursor: default; color: #333;
  }
  .dropdown-item:hover { background: #e8e2cc; }
  .dropdown-item.hl-item { background: #dde8f8; font-weight: 600; }

  /* Series status icon */
  .series-icon { font-size: 14px; cursor: default; }
  .series-icon.available { color: #cc8800; }
  .series-icon.done { color: #228822; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- TUTORIAL HEADER -->
<div class="tutorial-header">
  <h1>Заказ клиента на кабельную продукцию (бухты)</h1>
  <span class="step-indicator" id="stepIndicator">Шаг 1 из 12</span>
  <button class="nav-btn" id="btnPrev" disabled onclick="prevStep()">&#8592; Назад</button>
  <button class="nav-btn" id="btnNext" onclick="nextStep()">Далее &#8594;</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- MAIN -->
<div class="main-area">

<div class="onec-screen" style="position: relative;">

  <!-- 1C Top bar -->
  <div class="onec-topbar">
    <span class="onec-logo">1С</span>
    <span class="onec-hamburger">&#9776;</span>
    <span class="onec-topbar-title" id="topbarTitle">Управление торговлей, редакция 11 (1С:Предприятие)</span>
    <span class="onec-search">&#128269; Поиск Ctrl+Shift+F</span>
    <span class="onec-user">Менеджер</span>
  </div>

  <!-- Breadcrumb tabs -->
  <div class="onec-tabs" id="breadcrumbTabs"></div>

  <!-- Content: nav + main -->
  <div class="onec-content-wrap">
    <div class="onec-nav" id="navPanel"></div>
    <div class="onec-main" id="mainContent"></div>
  </div>

  <div class="onec-statusbar">Менеджер &middot; ООО &laquo;КабельТорг&raquo;</div>

</div>

<!-- HINT PANEL -->
<div class="hint-panel">
  <div class="hint-title" id="hintTitle"></div>
  <div class="hint-body" id="hintBody"></div>
</div>

</div>

<script>
const NAV_ITEMS = [
  { id: 'main', icon: '\u{1F3E0}', label: 'Главное' },
  { id: 'planning', icon: '\u{1F4CB}', label: 'Планирование' },
  { id: 'crm', icon: '\u{1F554}', label: 'CRM и маркетинг' },
  { id: 'sales', icon: '\u{1F6D2}', label: 'Продажи' },
  { id: 'purchases', icon: '\u{1F6CD}', label: 'Закупки' },
  { id: 'warehouse', icon: '\u{1F4E6}', label: 'Склад и доставка' },
  { id: 'treasury', icon: '\u{1F4B0}', label: 'Казначейство' },
  { id: 'finance', icon: '\u{1F4CA}', label: 'Финансовый результат' },
  { id: 'admin', icon: '\u2699', label: 'НСИ и администрирование' },
];

const STEPS = [
  // 0 — Предварительная настройка (на экране Главное)
  {
    hintTitle: 'Предварительная настройка',
    hint: `<p>Прежде чем оформить заказ, убедитесь, что для кабельной продукции настроен учёт серий.</p>
      <div class="hint-action">
        <b>Вид номенклатуры:</b> «Кабели силовые»<br>
        <b>Серия идентифицирует:</b> Партия товаров<br>
        <b>Политика учёта серий:</b> Управление остатками серий на уровне менеджеров<br>
        <b>Указание серий:</b> при планировании отгрузки
      </div>
      <div class="hint-tip"><b>Настройка:</b> НСИ и администрирование &rarr; Классификаторы номенклатуры &rarr; Политики учёта серий</div>
      <p class="hint-note">Каждая бухта = отдельная серия. Метраж указан в количестве серии. Цены — за метр кабеля.</p>`,
    activeNav: 'admin',
    tabs: ['Начальная страница'],
    activeTab: 0,
    screen: 'prereq'
  },
  // 1 — Открыть Продажи
  {
    hintTitle: 'Раздел «Продажи»',
    hint: `<p>Начинаем оформление заказа клиента на кабельную продукцию.</p>
      <div class="hint-action">Нажмите на раздел <b>«Продажи»</b> в панели навигации слева.</div>
      <p class="hint-note">В этом разделе находятся заказы клиентов, реализации, коммерческие предложения.</p>`,
    activeNav: 'sales',
    hlNav: 'sales',
    tabs: ['Начальная страница'],
    activeTab: 0,
    screen: 'home'
  },
  // 2 — Раздел Продажи → Заказы клиентов
  {
    hintTitle: 'Заказы клиентов',
    hint: `<p>Открылся раздел «Продажи».</p>
      <div class="hint-action">Нажмите <b>«Заказы клиентов»</b> в группе «Продажи».</div>
      <p class="hint-note">Журнал содержит все заказы клиентов с фильтрами по статусам и периоду.</p>`,
    activeNav: 'sales',
    tabs: ['Начальная страница'],
    activeTab: 0,
    screen: 'salesSection',
    hlLink: 'orders'
  },
  // 3 — Журнал → Создать
  {
    hintTitle: 'Создание заказа',
    hint: `<p>Открылся журнал заказов клиентов.</p>
      <div class="hint-action">Нажмите кнопку <b>«Создать»</b> на командной панели.</div>
      <p class="hint-note">Будет создан новый документ «Заказ клиента».</p>`,
    activeNav: 'sales',
    tabs: ['Начальная страница', 'Заказы клиентов'],
    activeTab: 1,
    screen: 'orderList',
    hlCmd: 'create'
  },
  // 4 — Форма: Клиент
  {
    hintTitle: 'Клиент',
    hint: `<p>Открылась форма нового заказа. Заполним шапку.</p>
      <div class="hint-action">В поле <b>«Клиент»</b> выберите <b>«Строй-Монтаж»</b>.</div>
      <p class="hint-note">Контрагент и договор подставятся автоматически из соглашения.</p>`,
    activeNav: 'sales',
    tabs: ['Начальная страница', 'Заказы клиентов', 'Заказ клиента (создание)'],
    activeTab: 2,
    screen: 'orderForm',
    formTab: 'basic',
    hlField: 'client',
    fields: { client: '', org: 'ООО «КабельТорг»', partner: '', contract: '', agreement: '', warehouse: '' }
  },
  // 5 — Склад
  {
    hintTitle: 'Склад',
    hint: `<p>Клиент выбран, контрагент и договор заполнились.</p>
      <div class="hint-action">В поле <b>«Склад»</b> выберите <b>«Центральный склад»</b>.</div>
      <div class="hint-tip"><b>Важно:</b> на выбранном складе должна быть включена ордерная схема для работы с сериями при планировании отгрузки.</div>`,
    activeNav: 'sales',
    tabs: ['Начальная страница', 'Заказы клиентов', 'Заказ клиента (создание)'],
    activeTab: 2,
    screen: 'orderForm',
    formTab: 'basic',
    hlField: 'warehouse',
    fields: { client: 'Строй-Монтаж', org: 'ООО «КабельТорг»', partner: 'Строй-Монтаж', contract: 'Основной договор', agreement: 'Типовое соглашение', warehouse: '' }
  },
  // 6 — Вкладка Товары → Подбор
  {
    hintTitle: 'Подбор товаров',
    hint: `<p>Шапка заполнена. Добавим кабельную продукцию через подбор.</p>
      <div class="hint-action">Перейдите на вкладку <b>«Товары»</b> и нажмите <b>«Подбор»</b>.</div>
      <div class="hint-tip"><b>Совет:</b> в диалоге подбора установите отбор по виду номенклатуры <b>«Кабели силовые NYM»</b>. Можно также отфильтровать по числу жил, сечению и производителю.</div>`,
    activeNav: 'sales',
    tabs: ['Начальная страница', 'Заказы клиентов', 'Заказ клиента (создание)'],
    activeTab: 2,
    screen: 'orderForm',
    formTab: 'goods',
    hlCmd: 'pick',
    fields: { client: 'Строй-Монтаж', org: 'ООО «КабельТорг»', partner: 'Строй-Монтаж', contract: 'Основной договор', agreement: 'Типовое соглашение', warehouse: 'Центральный склад' },
    rows: []
  },
  // 7 — Товары добавлены
  {
    hintTitle: 'Количество (метраж)',
    hint: `<p>Кабельная продукция добавлена через подбор. Укажите количество в метрах.</p>
      <div class="hint-action">
        <b>NYM 3&times;2.5</b> &mdash; 150 м &times; 68,00 &#8381; = 10 200 &#8381;<br>
        <b>NYM 3&times;1.5</b> &mdash; 200 м &times; 45,00 &#8381; = 9 000 &#8381;<br>
        <b>ВВГнг 5&times;4</b> &mdash; 300 м &times; 125,00 &#8381; = 37 500 &#8381;
      </div>

let step = 0;

function render() {
  const s = STEPS[step];
  const total = STEPS.length;

  document.getElementById('stepIndicator').textContent = `Шаг ${step+1} из ${total}`;
  document.getElementById('btnPrev').disabled = step === 0;
  document.getElementById('btnNext').textContent = step === total-1 ? '\u2713 Готово' : 'Далее \u2192';
  document.getElementById('progressFill').style.width = ((step+1)/total*100)+'%';

  document.getElementById('hintTitle').innerHTML = `<span class="hint-step-num">${step+1}</span> ${s.hintTitle}`;
  document.getElementById('hintBody').innerHTML = s.hint;

  renderNav(s);
  renderTabs(s);
  renderContent(s);
}

function renderNav(s) {
  document.getElementById('navPanel').innerHTML = NAV_ITEMS.map(n => {
    const isActive = n.id === s.activeNav;
    const isHl = n.id === s.hlNav;
    return `<div class="nav-item ${isActive?'active':''} ${isHl?'hl':''}" style="position:relative;">
      <span class="nav-icon">${n.icon}</span> ${n.label}
    </div>`;
  }).join('');
}

function renderTabs(s) {
  document.getElementById('breadcrumbTabs').innerHTML = (s.tabs||[]).map((t,i) =>
    `<div class="onec-tab ${i===s.activeTab?'active':''}">${t}</div>`
  ).join('');
}

function renderContent(s) {
  const mc = document.getElementById('mainContent');
  switch(s.screen) {
    case 'home': mc.innerHTML = renderHome(); break;
    case 'prereq': mc.innerHTML = renderPrereq(); break;
    case 'salesSection': mc.innerHTML = renderSalesSection(s); break;
    case 'orderList': mc.innerHTML = renderOrderList(s); break;
    case 'orderForm': mc.innerHTML = renderOrderForm(s); break;
    case 'seriesDialog': mc.innerHTML = renderOrderFormWithDialog(s); break;
    case 'done': mc.innerHTML = renderDone(); break;
    default: mc.innerHTML = '';
  }
}

          <span class="btn-gray">Распределить</span>
          <span class="btn-gray">Очистить</span>
          <span class="btn-yellow">ОК</span>
          <span class="btn-gray">Отмена</span>
        </div>
      </div>
    </div>`;

  return formBg + dialog;
}

function renderDone() {
  return `<div class="done-page">
    <div style="font-size:42px;">&#10004;</div>
    <div style="font-size:16px;font-weight:700;color:#333;">Заказ оформлен</div>
    <div class="done-cards">
      <div class="done-card" style="background:#e8f5e0;">
        <div class="dc-label">Позиций</div>
        <div class="dc-val" style="color:#228822;">3</div>
      </div>
      <div class="done-card" style="background:#e0ecf5;">
        <div class="dc-label">Бухт подобрано</div>
        <div class="dc-val" style="color:#2266aa;">5</div>
      </div>
      <div class="done-card" style="background:#fff5e0;">
        <div class="dc-label">Итого</div>
        <div class="dc-val" style="color:#996600;">56 700 &#8381;</div>
      </div>
      <div class="done-card" style="background:#f0e8f5;">
        <div class="dc-label">Общий метраж</div>
        <div class="dc-val" style="color:#664488;">650 м</div>
      </div>
    </div>
  </div>`;
}

function nextStep() { if (step < STEPS.length - 1) { step++; render(); } }
function prevStep() { if (step > 0) { step--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextStep();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevStep();
});

render();
</script>
</body>
</html>
